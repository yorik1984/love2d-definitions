name: Generate LÖVE EmmyLua API

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Lua 5.1
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - name: Generate API
        run: |
          # Clone love-api repository
          git clone https://github.com/love2d-community/love-api love_source

          # Copy required files
          cp -r love_source/modules .
          cp love_source/love_api.lua .

        # Generate API files (outputs to api/ directory by default)
      - name: Generate API
        run: |
          echo "🔧 Generating EmmyLua API..."
          lua genEmmyAPI.lua
          echo "📊 Generated $(find api -name "*.lua" | wc -l) files"

      - name: Cleanup temporary files
        run: |
          rm -rf modules love_api.lua love_source

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet api/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected"
          fi

      - name: Commit and push
        # Only commit on main branch (not on PRs)
        if: |
          steps.check_changes.outputs.changed == 'true' &&
          github.event_name != 'pull_request' &&
          github.ref == 'refs/heads/main'
        run: |
          echo "💾 Committing changes..."

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add api/

          # Get statistics for commit message
          file_count=$(find api -name "*.lua" | wc -l)
          class_count=$(grep -r "@class love\." api/ | wc -l)

          git commit -m "chore: regenerate LÖVE API from official love-api

          - Generated $file_count API files
          - Created $class_count @class definitions
          - All tests passed ✅

          Auto-generated by GitHub Actions"

          git push origin main
          echo "✅ Changes pushed"

      - name: Summary
        if: always()
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "📊 Generation Summary"
          echo "════════════════════════════════════════════════════════════"

          if [ -d "api" ]; then
            file_count=$(find api -name "*.lua" | wc -l)

            echo "Event: ${{ github.event_name }}"
            echo "Branch: ${{ github.ref }}"
            echo ""
            echo "✓ API files: $file_count"
            echo "✓ Tests: PASSED"
            echo "✓ Validation: PASSED"

            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo ""
              echo "ℹ️ PR mode: Changes not committed (validation only)"
            elif [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
              echo ""
              echo "✓ Changes committed and pushed"
            else
              echo ""
              echo "ℹ️ No changes to commit"
            fi
          else
            echo "✗ Generation failed"
          fi

          echo "════════════════════════════════════════════════════════════"
